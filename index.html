<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hatif.io Caller</title>
  <!-- Pipedrive App Extensions SDK (official UMD build) - MUST be in head -->
  <script src="https://cdn.jsdelivr.net/npm/@pipedrive/app-extensions-sdk@0/dist/index.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2c5282; --primary-light: #3182ce; --primary-dark: #1a365d;
      --success: #276749; --success-bg: #c6f6d5;
      --danger: #c53030; --danger-bg: #fed7d7;
      --gray-50: #f7fafc; --gray-100: #edf2f7; --gray-200: #e2e8f0;
      --gray-400: #a0aec0; --gray-600: #718096; --gray-800: #2d3748;
      --white: #fff; --radius: 10px; --shadow: 0 4px 20px rgba(0,0,0,0.12);
    }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: var(--gray-50); color: var(--gray-800);
      min-height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: var(--white); padding: 14px 16px;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .header-logo {
      width: 32px; height: 32px; background: rgba(255,255,255,0.2);
      border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .header-title { font-size: 15px; font-weight: 700; }
    .header-subtitle { font-size: 11px; opacity: 0.7; margin-top: 1px; }
    .content { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
    .contact-card {
      background: var(--white); border-radius: var(--radius); padding: 14px;
      box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px;
    }
    .contact-avatar {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      color: var(--white); font-weight: 700; font-size: 18px; flex-shrink: 0;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contact-label { font-size: 11px; color: var(--gray-600); margin-top: 2px; }
    .contact-card.hidden { display: none; }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-label { font-size: 12px; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.5px; }
    .phone-input-wrapper {
      display: flex; background: var(--white); border: 2px solid var(--gray-200);
      border-radius: var(--radius); overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .phone-input-wrapper:focus-within { border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(49,130,206,0.15); }
    .phone-flag { padding: 0 12px; background: var(--gray-100); display: flex; align-items: center; font-size: 18px; border-left: 1px solid var(--gray-200); }
    input[type="tel"] {
      flex: 1; border: none; outline: none; padding: 11px 14px; font-size: 16px;
      font-family: 'Courier New', monospace; font-weight: 600;
      color: var(--gray-800); background: transparent; direction: ltr; text-align: left;
    }
    input[type="tel"]::placeholder { color: var(--gray-400); font-weight: 400; }
    .call-btn {
      width: 100%; padding: 14px; border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.2s;
    }
    .call-btn.idle { background: linear-gradient(135deg, #38a169, #276749); color: var(--white); box-shadow: 0 4px 14px rgba(56,161,105,0.4); }
    .call-btn.idle:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(56,161,105,0.5); }
    .call-btn.calling { background: linear-gradient(135deg, #ed8936, #c05621); color: var(--white); cursor: not-allowed; }
    .call-btn.success { background: linear-gradient(135deg, #4299e1, #2b6cb0); color: var(--white); cursor: default; }
    .call-btn.error { background: linear-gradient(135deg, #fc8181, #c53030); color: var(--white); }
    .call-btn:disabled { opacity: 0.85; }
    .btn-icon { font-size: 20px; }
    .btn-spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; display: none; align-items: flex-start; gap: 8px; line-height: 1.5; }
    .status-alert.show { display: flex; }
    .status-alert.success { background: var(--success-bg); color: var(--success); }
    .status-alert.error { background: var(--danger-bg); color: var(--danger); }
    .status-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .init-overlay {
      position: absolute; inset: 0; background: var(--gray-50);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 100;
    }
    .init-spinner { width: 36px; height: 36px; border: 3px solid var(--gray-200); border-top-color: var(--primary-light); border-radius: 50%; animation: spin 1s linear infinite; }
    .init-text { font-size: 13px; color: var(--gray-600); }
    .init-overlay.hidden { display: none; }
    .footer { padding: 10px 16px; text-align: center; font-size: 11px; color: var(--gray-400); border-top: 1px solid var(--gray-200); flex-shrink: 0; }
    #debugLog { position: fixed; bottom: 0; left: 0; right: 0; background: #1a202c; color: #68d391; font-family: monospace; font-size: 10px; padding: 6px 10px; max-height: 80px; overflow-y: auto; z-index: 9999; direction: ltr; text-align: left; }
  </style>
</head>
<body>
  <div id="debugLog"></div>
  <div class="init-overlay" id="initOverlay">
    <div class="init-spinner"></div>
    <div class="init-text">جاري التهيئة...</div>
  </div>
  <div class="header">
    <div class="header-logo">📞</div>
    <div>
      <div class="header-title">Hatif.io Caller</div>
      <div class="header-subtitle">الاتصال الذكي عبر Hatif.io</div>
    </div>
  </div>
  <div class="content">
    <div class="contact-card hidden" id="contactCard">
      <div class="contact-avatar" id="contactAvatar">?</div>
      <div class="contact-info">
        <div class="contact-name" id="contactName"></div>
        <div class="contact-label">جهة الاتصال</div>
      </div>
    </div>
    <div class="input-group">
      <div class="input-label">رقم الهاتف</div>
      <div class="phone-input-wrapper">
        <div class="phone-flag">🇸🇦</div>
        <input type="tel" id="phoneInput" placeholder="+966 5X XXX XXXX" autocomplete="tel" dir="ltr" />
      </div>
    </div>
    <div class="status-alert" id="statusAlert">
      <span class="status-icon" id="statusIcon"></span>
      <span id="statusText"></span>
    </div>
    <button class="call-btn idle" id="callBtn">
      <span class="btn-icon">📞</span>
      <span id="callBtnText">بدء الاتصال</span>
    </button>
  </div>
  <div class="footer">Powered by Hatif.io - Fusion Leap</div>

  <script>
    var dbg = document.getElementById('debugLog');
    function dlog(m) { dbg.textContent += m + '\n'; dbg.scrollTop = dbg.scrollHeight; }

    dlog('1. Script start. SDK type: ' + typeof window.AppExtensionsSDK);
    dlog('2. URL id param: ' + new URLSearchParams(location.search).get('id'));

    var N8N_CALL_WEBHOOK = 'https://automation.fusionleap.net/webhook/pipedrive-start-call';
    var sdk = null;
    var currentPhone = '';
    var currentName = 'unknown';
    var isCalling = false;

    (async function() {
      try {
        dlog('3. Starting SDK init...');
        var SDKClass = window.AppExtensionsSDK;
        if (!SDKClass) { dlog('FATAL: SDK not on window'); return; }

        sdk = await new SDKClass().initialize({ size: { height: 400 } });
        dlog('4. SDK OK!');

        sdk.listen('visibility', function(payload) {
          dlog('Event: ' + JSON.stringify(payload).substring(0, 200));
        });

        document.getElementById('initOverlay').classList.add('hidden');
        dlog('5. Ready');
      } catch (e) {
        dlog('ERR: ' + e.message);
        document.getElementById('initOverlay').classList.add('hidden');
      }
    })();

    document.getElementById('callBtn').addEventListener('click', function() { initiateCall(); });
    document.getElementById('phoneInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') initiateCall(); });

    function setStatus(type, icon, text) {
      var el = document.getElementById('statusAlert');
      el.className = 'status-alert show ' + type;
      document.getElementById('statusIcon').textContent = icon;
      document.getElementById('statusText').textContent = text;
    }

    function setBtn(state, label) {
      var btn = document.getElementById('callBtn');
      btn.className = 'call-btn ' + state;
      btn.disabled = (state === 'calling' || state === 'success');
      document.getElementById('callBtnText').textContent = label;
    }

    async function initiateCall() {
      if (isCalling) return;
      var phone = document.getElementById('phoneInput').value.trim();
      if (!phone) { setStatus('error', '', 'Enter phone number'); return; }

      isCalling = true;
      setBtn('calling', 'Calling...');
      document.getElementById('statusAlert').className = 'status-alert';

      try {
        var res = await fetch(N8N_CALL_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: phone, name: currentName }),
        });
        var data = await res.json().catch(function() { return {}; });
        if (res.ok && data.success !== false) {
          setBtn('success', 'Call started!');
          setStatus('success', '', 'Call initiated to ' + phone);
          setTimeout(function() { isCalling = false; setBtn('idle', 'Start Call'); document.getElementById('statusAlert').className = 'status-alert'; }, 8000);
        } else {
          throw new Error(data.error || data.message || 'Unknown error');
        }
      } catch (e) {
        setBtn('error', 'Retry');
        setStatus('error', '', 'Failed: ' + e.message);
        isCalling = false;
      }
    }
  </script>
</body>
</html>
