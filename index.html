<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hatif.io Caller</title>
  <style>
    body { font-family: monospace; padding: 16px; background: #f7fafc; font-size: 13px; }
    .log { margin: 4px 0; padding: 6px 10px; border-radius: 6px; }
    .ok  { background: #c6f6d5; color: #276749; }
    .err { background: #fed7d7; color: #c53030; }
    .info { background: #ebf8ff; color: #2c5282; }
    h2 { margin-bottom: 12px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@pipedrive/app-extensions-sdk@0/dist/index.umd.js"></script>
</head>
<body>
  <h2>Hatif.io Caller - Debug Mode</h2>
  <div id="logs"></div>

  <script>
    function log(msg, type) {
      const d = document.createElement('div');
      d.className = 'log ' + type;
      d.textContent = '[' + new Date().toISOString().slice(11,23) + '] ' + msg;
      document.getElementById('logs').appendChild(d);
    }

    (async function() {
      try {
        log('Page loaded. URL: ' + location.href, 'info');
        log('URL search params: ' + location.search, 'info');

        const idParam = new URLSearchParams(location.search).get('id');
        log('id param: ' + (idParam || 'NULL / MISSING'), idParam ? 'ok' : 'err');

        const sdkAvailable = typeof window.AppExtensionsSDK;
        log('window.AppExtensionsSDK type: ' + sdkAvailable, sdkAvailable === 'function' ? 'ok' : 'err');

        if (sdkAvailable !== 'function') {
          log('FATAL: SDK class not found on window. Cannot proceed.', 'err');
          return;
        }

        log('Creating SDK instance...', 'info');
        const sdkInstance = new window.AppExtensionsSDK();
        log('SDK instance created. identifier: ' + (sdkInstance.identifier || 'NONE'), 'ok');

        log('Calling sdk.initialize({ size: { height: 400 } })...', 'info');
        const sdk = await sdkInstance.initialize({ size: { height: 400 } });
        log('SDK initialized successfully!', 'ok');

        log('Listening for visibility events...', 'info');
        sdk.listen('visibility', (data) => {
          log('Visibility event: ' + JSON.stringify(data), 'info');
        });

        log('ALL OK - SDK handshake complete', 'ok');

      } catch (err) {
        log('ERROR: ' + err.message, 'err');
        log('Error stack: ' + (err.stack || 'no stack'), 'err');
      }
    })();
  </script>
</body>
</html>
