<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hatif.io Caller</title>
  <!-- BUG 4 FIX: Pinned to exact version 0.13.1 -->
  <script src="https://cdn.jsdelivr.net/npm/@pipedrive/app-extensions-sdk@0.13.1/dist/index.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2c5282; --primary-light: #3182ce; --primary-dark: #1a365d;
      --success: #276749; --success-bg: #c6f6d5;
      --danger: #c53030; --danger-bg: #fed7d7;
      --gray-50: #f7fafc; --gray-100: #edf2f7; --gray-200: #e2e8f0;
      --gray-400: #a0aec0; --gray-600: #718096; --gray-800: #2d3748;
      --white: #fff; --radius: 10px; --shadow: 0 4px 20px rgba(0,0,0,0.12);
    }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: var(--gray-50); color: var(--gray-800);
      min-height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: var(--white); padding: 14px 16px;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .header-logo {
      width: 32px; height: 32px; background: rgba(255,255,255,0.2);
      border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .header-title { font-size: 15px; font-weight: 700; }
    .header-subtitle { font-size: 11px; opacity: 0.7; margin-top: 1px; }
    .content { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
    .contact-card {
      background: var(--white); border-radius: var(--radius); padding: 14px;
      box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px;
    }
    .contact-avatar {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      color: var(--white); font-weight: 700; font-size: 18px; flex-shrink: 0;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contact-label { font-size: 11px; color: var(--gray-600); margin-top: 2px; }
    .contact-card.hidden { display: none; }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-label { font-size: 12px; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.5px; }
    .phone-input-wrapper {
      display: flex; background: var(--white); border: 2px solid var(--gray-200);
      border-radius: var(--radius); overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .phone-input-wrapper:focus-within { border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(49,130,206,0.15); }
    .phone-flag { padding: 0 12px; background: var(--gray-100); display: flex; align-items: center; font-size: 18px; border-left: 1px solid var(--gray-200); }
    input[type="tel"] {
      flex: 1; border: none; outline: none; padding: 11px 14px; font-size: 16px;
      font-family: 'Courier New', monospace; font-weight: 600;
      color: var(--gray-800); background: transparent; direction: ltr; text-align: left;
    }
    input[type="tel"]::placeholder { color: var(--gray-400); font-weight: 400; }
    .call-btn {
      width: 100%; padding: 14px; border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.2s;
    }
    .call-btn.idle { background: linear-gradient(135deg, #38a169, #276749); color: var(--white); box-shadow: 0 4px 14px rgba(56,161,105,0.4); }
    .call-btn.idle:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(56,161,105,0.5); }
    .call-btn.calling { background: linear-gradient(135deg, #ed8936, #c05621); color: var(--white); cursor: not-allowed; }
    .call-btn.success { background: linear-gradient(135deg, #4299e1, #2b6cb0); color: var(--white); cursor: default; }
    .call-btn.error { background: linear-gradient(135deg, #fc8181, #c53030); color: var(--white); }
    .call-btn:disabled { opacity: 0.85; }
    .btn-icon { font-size: 20px; }
    .btn-spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; display: none; align-items: flex-start; gap: 8px; line-height: 1.5; }
    .status-alert.show { display: flex; }
    .status-alert.success { background: var(--success-bg); color: var(--success); }
    .status-alert.error   { background: var(--danger-bg); color: var(--danger); }
    .status-alert.info    { background: #ebf8ff; color: #2c5282; }
    .status-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .init-overlay {
      position: absolute; inset: 0; background: var(--gray-50);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 100;
    }
    .init-spinner { width: 36px; height: 36px; border: 3px solid var(--gray-200); border-top-color: var(--primary-light); border-radius: 50%; animation: spin 1s linear infinite; }
    .init-text { font-size: 13px; color: var(--gray-600); }
    .init-overlay.hidden { display: none; }
    .footer { padding: 10px 16px; text-align: center; font-size: 11px; color: var(--gray-400); border-top: 1px solid var(--gray-200); flex-shrink: 0; }
    .loading-phone { font-size: 12px; color: var(--primary-light); padding: 8px 0; display: none; align-items: center; gap: 6px; }
    .loading-phone.show { display: flex; }
    .mini-spinner { width: 14px; height: 14px; border: 2px solid var(--gray-200); border-top-color: var(--primary-light); border-radius: 50%; animation: spin 0.8s linear infinite; }
    /* BUG 7 FIX: New call button after success */
    .new-call-btn {
      width: 100%; padding: 10px; border: 2px solid var(--primary-light); border-radius: var(--radius);
      font-size: 13px; font-weight: 600; cursor: pointer; color: var(--primary-light);
      background: transparent; display: none; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.2s;
    }
    .new-call-btn.show { display: flex; }
    .new-call-btn:hover { background: var(--gray-100); }
  </style>
</head>
<body>
  <div class="init-overlay" id="initOverlay">
    <div class="init-spinner"></div>
    <div class="init-text">جاري التهيئة...</div>
  </div>
  <div class="header">
    <div class="header-logo">📞</div>
    <div>
      <div class="header-title">Hatif.io Caller</div>
      <div class="header-subtitle">الاتصال الذكي عبر Hatif.io</div>
    </div>
  </div>
  <div class="content">
    <div class="contact-card hidden" id="contactCard">
      <div class="contact-avatar" id="contactAvatar">?</div>
      <div class="contact-info">
        <div class="contact-name" id="contactName"></div>
        <div class="contact-label">جهة الاتصال</div>
      </div>
    </div>
    <div class="input-group">
      <div class="input-label">رقم الهاتف</div>
      <div class="phone-input-wrapper">
        <div class="phone-flag">🇸🇦</div>
        <input type="tel" id="phoneInput" placeholder="+966 5X XXX XXXX" autocomplete="tel" dir="ltr" />
      </div>
      <div class="loading-phone" id="loadingPhone">
        <div class="mini-spinner"></div>
        <span>جاري جلب الرقم من Pipedrive...</span>
      </div>
    </div>
    <div class="status-alert" id="statusAlert">
      <span class="status-icon" id="statusIcon"></span>
      <span id="statusText"></span>
    </div>
    <button class="call-btn idle" id="callBtn">
      <span class="btn-icon">📞</span>
      <span id="callBtnText">بدء الاتصال</span>
    </button>
    <!-- BUG 7 FIX: New call button shown after success -->
    <button class="new-call-btn" id="newCallBtn">
      <span>📞</span>
      <span>اتصال جديد</span>
    </button>
  </div>
  <div class="footer">Powered by Hatif.io - Fusion Leap</div>

  <script>
    var N8N_CALL_WEBHOOK = 'https://automation.fusionleap.net/webhook/pipedrive-start-call';
    var N8N_GET_PHONE    = 'https://automation.fusionleap.net/webhook/pipedrive-get-phone';

    var sdk        = null;
    var currentPhone = '';
    var currentName  = '';
    var currentDealId = '';   // IMP 1: track dealId
    var isCalling  = false;
    var fetchDebounceTimer = null;  // BUG 1: debounce timer

    (async function() {
      try {
        var SDKClass = window.AppExtensionsSDK;
        if (!SDKClass) throw new Error('SDK not loaded');
        sdk = await new SDKClass().initialize({ size: { height: 460 } });

        sdk.listen('visibility', function(payload) {
          var data = (payload && payload.data) ? payload.data : payload;
          if (!data) return;
          var isVisible = data.is_visible !== undefined ? data.is_visible : true;
          if (!isVisible) return;

          var ctx     = data.context || {};
          var related = ctx.relatedIds || {};

          var phone    = ctx.phoneNumber || ctx.phone_number || ctx.phone || '';
          var name     = ctx.personName  || ctx.person_name  || ctx.name  || '';
          var personId = related.personId || ctx.personId || null;
          var dealId   = related.dealId   || ctx.dealId   || '';

          // IMP 1: Always capture dealId
          currentDealId = dealId;

          // BUG 2 FIX: Always reset UI before filling new contact
          resetContactUI();

          if (phone) {
            // BUG 3 FIX: Format phone to international format
            fillContact(formatPhone(phone), name);
          } else if (personId) {
            // BUG 1 FIX: Debounce 500ms — always re-fetch, no lastPersonId guard
            clearTimeout(fetchDebounceTimer);
            fetchDebounceTimer = setTimeout(function() {
              fetchPhoneFromPipedrive(personId);
            }, 500);
          }
        });

        document.getElementById('initOverlay').classList.add('hidden');
      } catch (e) {
        console.warn('SDK init:', e);
        document.getElementById('initOverlay').classList.add('hidden');
      }
    })();

    // BUG 3 FIX: Format to Saudi international format
    function formatPhone(phone) {
      var digits = phone.toString().replace(/\s+/g, '').replace(/^00/, '+');
      if (!digits.startsWith('+')) {
        digits = '+966' + digits.replace(/^0/, '');
      }
      return digits;
    }

    async function fetchPhoneFromPipedrive(personId) {
      document.getElementById('loadingPhone').classList.add('show');
      clearStatus();
      try {
        var res = await fetch(N8N_GET_PHONE + '?personId=' + personId);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        if (data.phone) {
          // BUG 3 FIX: Format the fetched phone too
          fillContact(formatPhone(data.phone), data.name || '');
        } else {
          // BUG 6 FIX: Visible error when no phone found
          setStatus('info', 'ℹ️', 'لا يوجد رقم هاتف مسجل. يمكنك الإدخال يدوياً.');
        }
      } catch (e) {
        // BUG 6 FIX: Visible error on network/server failure
        setStatus('info', 'ℹ️', 'تعذّر جلب الرقم من Pipedrive. يمكنك الإدخال يدوياً.');
        console.warn('Failed to fetch phone:', e);
      }
      document.getElementById('loadingPhone').classList.remove('show');
    }

    // BUG 2 FIX: Reset contact UI (called before each new visibility event)
    function resetContactUI() {
      document.getElementById('phoneInput').value = '';
      document.getElementById('contactCard').classList.add('hidden');
      document.getElementById('contactName').textContent = '';
      document.getElementById('contactAvatar').textContent = '?';
      currentPhone = '';
      currentName  = '';
      clearStatus();
    }

    function fillContact(phone, name) {
      currentPhone = phone;
      currentName  = name || '';
      document.getElementById('phoneInput').value = phone;
      if (name) {
        document.getElementById('contactName').textContent = name;
        var parts = name.trim().split(/\s+/);
        document.getElementById('contactAvatar').textContent =
          parts.length >= 2 ? (parts[0][0] + parts[1][0]).toUpperCase() : parts[0][0].toUpperCase();
        document.getElementById('contactCard').classList.remove('hidden');
      }
    }

    function setStatus(type, icon, text) {
      var el = document.getElementById('statusAlert');
      el.className = 'status-alert show ' + type;
      document.getElementById('statusIcon').textContent = icon;
      document.getElementById('statusText').textContent = text;
    }

    function clearStatus() {
      document.getElementById('statusAlert').className = 'status-alert';
    }

    function setBtn(state, label) {
      var btn = document.getElementById('callBtn');
      btn.className = 'call-btn ' + state;
      btn.disabled = (state === 'calling' || state === 'success');
      if (state === 'calling') {
        btn.innerHTML = '<div class="btn-spinner"></div><span id="callBtnText">' + label + '</span>';
      } else {
        var icons = { idle: '📞', success: '✅', error: '🔄' };
        btn.innerHTML = '<span class="btn-icon">' + (icons[state] || '📞') + '</span><span id="callBtnText">' + label + '</span>';
      }
    }

    async function initiateCall() {
      if (isCalling) return;
      var phone = document.getElementById('phoneInput').value.trim();
      if (!phone) { setStatus('error', '⚠️', 'الرجاء إدخال رقم الهاتف أولاً'); return; }
      if (phone.replace(/\D/g, '').length < 9) { setStatus('error', '⚠️', 'رقم الهاتف قصير جداً'); return; }

      isCalling = true;
      clearStatus();
      setBtn('calling', 'جاري الاتصال...');
      document.getElementById('newCallBtn').classList.remove('show');

      if (sdk) { try { await sdk.execute('set_focus_mode', { is_enabled: true }); } catch (e) {} }

      try {
        var res = await fetch(N8N_CALL_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          // IMP 1: Include dealId and personName in payload
          body: JSON.stringify({
            phone:  phone,
            name:   currentName || phone,
            dealId: currentDealId || ''
          }),
        });
        var data = await res.json().catch(function() { return {}; });
        if (res.ok && data.success !== false) {
          setBtn('success', 'تم الاتصال بنجاح');
          setStatus('success', '✅', 'تم بدء الاتصال. سيتلقى المتصل رسالة صوتية قريباً.');

          // BUG 7 FIX: Show "new call" button immediately; auto-reset after 4s
          document.getElementById('newCallBtn').classList.add('show');
          setTimeout(resetUI, 4000);
        } else {
          throw new Error(data.error || data.message || 'خطأ غير معروف');
        }
      } catch (e) {
        setBtn('error', 'إعادة المحاولة');
        setStatus('error', '❌', 'فشل الاتصال: ' + e.message);
        isCalling = false;
        if (sdk) { try { await sdk.execute('set_focus_mode', { is_enabled: false }); } catch (x) {} }
      }
    }

    function resetUI() {
      isCalling = false;
      clearStatus();
      setBtn('idle', 'بدء الاتصال');
      document.getElementById('newCallBtn').classList.remove('show');
      if (sdk) { try { sdk.execute('set_focus_mode', { is_enabled: false }); } catch (e) {} }
    }

    document.getElementById('callBtn').addEventListener('click', function() { initiateCall(); });
    // BUG 7 FIX: New call button resets UI immediately
    document.getElementById('newCallBtn').addEventListener('click', function() { resetUI(); });
    document.getElementById('phoneInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') initiateCall(); });
    document.getElementById('phoneInput').addEventListener('input', function() {
      currentPhone = document.getElementById('phoneInput').value;
    });
  </script>
</body>
</html>
